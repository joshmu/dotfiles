# gh-dash configuration
# https://github.com/dlvhdr/gh-dash
pager:
  diff: diffnav

defaults:
  preview:
    open: true
    width: 80
  prsLimit: 20
  issuesLimit: 20
  refetchIntervalMinutes: 30

repoPaths:
  brevilledigital/*: ~/work/breville/source/*
  joshmu/*: ~/Desktop/code/*

prSections:
  - title: Breville PRs
    filters: is:open author:@me org:brevilledigital
  - title: My PRs
    filters: is:open author:@me
  - title: Needs Review
    filters: is:open review-requested:@me
  - title: Involved
    filters: is:open involves:@me -author:@me

issuesSections:
  - title: My Issues
    filters: is:open author:@me
  - title: Assigned
    filters: is:open assignee:@me

keybindings:
  universal:
    - key: g
      command: tmux new-window -n "lazygit" -c {{.RepoPath}} lazygit
  prs:
    - key: w
      command: >
        tmux new-window -n "pr-{{.PrNumber}}"
        "cd {{.RepoPath}} &&
        git fetch origin pull/{{.PrNumber}}/head:{{.HeadRefName}} 2>/dev/null;
        ~/dotfiles/scripts/worktree.ts create pr-{{.PrNumber}} --branch {{.HeadRefName}} --existing-branch;
        cd $(dirname {{.RepoPath}})/worktrees/$(basename {{.RepoPath}})/pr-{{.PrNumber}};
        exec $SHELL"
    - key: C
      command: >
        tmux new-window -n "pr-{{.PrNumber}}"
        "cd {{.RepoPath}} &&
        git fetch origin pull/{{.PrNumber}}/head:{{.HeadRefName}} 2>/dev/null;
        ~/dotfiles/scripts/worktree.ts create pr-{{.PrNumber}} --branch {{.HeadRefName}} --existing-branch;
        cd $(dirname {{.RepoPath}})/worktrees/$(basename {{.RepoPath}})/pr-{{.PrNumber}};
        CLAUDE_AUTO_REFLECT=1 claude --allow-dangerously-skip-permissions 'Review PR #{{.PrNumber}} in {{.RepoName}} ({{.HeadRefName}}). Use /pr-review or /code-review:code-review to perform a thorough code review.'"
    - key: v
      command: gh pr review --approve --repo {{.RepoName}} {{.PrNumber}}
    - key: M
      command: gh pr merge --merge --repo {{.RepoName}} {{.PrNumber}}
